<!DOCTYPE html>
<html>

<head>
    <title>Audio Test</title>
</head>

<body>
    <h1>Audio Context Test</h1>
    <button id="testBtn">Click to Test Audio</button>
    <div id="status"></div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const statusDiv = document.getElementById('status');

        document.getElementById('testBtn').addEventListener('click', () => {
            statusDiv.innerHTML = `Audio Context State: ${audioCtx.state}<br>`;

            if (audioCtx.state === 'suspended') {
                audioCtx.resume().then(() => {
                    statusDiv.innerHTML += 'Audio context resumed<br>';
                    playTestTone();
                });
            } else {
                playTestTone();
            }
        });

        function playTestTone() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.frequency.value = 440; // A4
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);

            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 1);

            statusDiv.innerHTML += `Playing 440Hz tone<br>Gain: ${gain.gain.value}<br>`;
        }
    </script>
</body>

</html>
